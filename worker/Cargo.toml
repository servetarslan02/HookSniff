[package]
name = "hookrelay-worker"
version.workspace = true
edition.workspace = true

[dependencies]
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
uuid.workspace = true
chrono.workspace = true
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

reqwest = { version = "0.12", features = ["json"] }
rdkafka = { version = "0.36", features = ["cmake-build"] }
sqlx = { version = "0.7", features = ["runtime-tokio", "tls-rustls", "chrono", "uuid"] }
dotenvy = "0.15"
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"

# Temporal SDK — prerelease Rust SDK for workflow orchestration.
# See https://github.com/temporalio/sdk-rust for status & docs.
# Requires protoc (protobuf compiler) installed to build.
temporalio-sdk = { version = "0.3", default-features = false, features = ["envconfig"] }
temporalio-client = { version = "0.3", default-features = false }
temporalio-sdk-core = { version = "0.3", default-features = false }
temporalio-macros = "0.3"
