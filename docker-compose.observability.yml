# HookRelay Observability Stack
# Distributed tracing with Jaeger + OpenTelemetry Collector
# Usage: docker compose -f docker-compose.observability.yml up -d

services:
  # ──────────────────────────────────────────────
  # OpenTelemetry Collector
  # Receives traces from the API/Worker and forwards to Jaeger
  # ──────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Collector metrics (for Prometheus)
    volumes:
      - ./monitoring/otel-collector-config.yml:/etc/otelcol/config.yaml:ro
    command: ["--config=/etc/otelcol/config.yaml"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Jaeger — distributed tracing UI
  # ──────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # Jaeger UI
      - "14250:14250"   # gRPC endpoint for Jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
