# Prometheus configuration for HookSniff monitoring

global:
  scrape_interval: 15s       # Default scrape interval
  evaluation_interval: 15s   # Rule evaluation interval
  scrape_timeout: 10s

# Alert rules
rule_files:
  - "alert_rules.yml"

# Scrape targets
scrape_configs:
  # ── Prometheus self-monitoring ──
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── HookSniff API (Cloud Run) ──
  - job_name: "hooksniff-api"
    metrics_path: "/metrics"
    scrape_interval: 30s
    scheme: https
    authorization:
      type: Bearer
      credentials: "1d4487405a247de66acd5a8775294334707bb9ac0ea3318c8fbd1508074bd28d"
    static_configs:
      - targets: ["hooksniff-api-1046140057667.europe-west1.run.app"]
        labels:
          service: "hooksniff-api"
          environment: "production"

  # ── HookSniff Worker ──
  - job_name: "hooksniff-worker"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["worker:9090"]
        labels:
          service: "hooksniff-worker"
          environment: "production"
