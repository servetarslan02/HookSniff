# OpenTelemetry Collector configuration for HookSniff
# Receives traces via OTLP and exports to Jaeger

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Batch spans before exporting to reduce network calls
  batch:
    timeout: 5s
    send_batch_size: 1024

  # Filter out health check traces to reduce noise
  filter:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.target"] == "/health"'
        - 'attributes["http.target"] == "/metrics"'

exporters:
  # Export to Jaeger (local)
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Export to Grafana Cloud (production)
  # Auth: Basic base64(<instance_id>:<glc_token>)
  # Set OTEL_AUTH_HEADER env var to: Basic <base64_encoded_credentials>
  otlphttp/grafana:
    endpoint: https://otlp-gateway-prod-eu-west-2.grafana.net/otlp
    headers:
      authorization: "${env:OTEL_AUTH_HEADER}"

  # Debug exporter for troubleshooting (remove in production)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [filter, batch]
      exporters: [otlp/jaeger, otlphttp/grafana, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/grafana]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/grafana]

  extensions: []
