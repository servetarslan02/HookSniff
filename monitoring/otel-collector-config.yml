# OpenTelemetry Collector configuration for HookSniff
# Receives traces via OTLP and exports to Jaeger

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Batch spans before exporting to reduce network calls
  batch:
    timeout: 5s
    send_batch_size: 1024

  # Filter out health check traces to reduce noise
  filter:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.target"] == "/health"'
        - 'attributes["http.target"] == "/metrics"'

exporters:
  # Export to Jaeger (local)
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Export to Grafana Cloud (production)
  # Auth: Basic base64(1625476:<glc_token>)
  # Token yenileme: https://grafana.com/orgs/hookrelay → Security → Cloud Access Policies → hooksniff
  otlphttp/grafana:
    endpoint: https://otlp-gateway-prod-eu-west-2.grafana.net/otlp
    headers:
      authorization: "Basic MTYyNTQ3NjpnbGNfZXlKdklqb2lNVGMxTnpNek5TSXNJbTRpT2lKb2IyOXJjMjVwWm1ZdGFHOXZhM051YVdabU1pSXNJbXNpT2lKUFUxQktZVEJzZERBek9UTk5hVFF3TmpaME1WaEtSVlFpTENKdElqcDdJbklpT2lKMWN5SjlmUT09"

  # Debug exporter for troubleshooting (remove in production)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [filter, batch]
      exporters: [otlp/jaeger, otlphttp/grafana, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/grafana]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/grafana]

  extensions: []
