# OpenTelemetry Collector configuration for HookSniff
# Receives traces via OTLP and exports to Sentry

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Batch spans before exporting to reduce network calls
  batch:
    timeout: 5s
    send_batch_size: 1024

  # Filter out health check traces to reduce noise
  filter:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.target"] == "/health"'
        - 'attributes["http.target"] == "/metrics"'

exporters:
  # Export to Sentry via OTLP
  # Auth: Bearer <SENTRY_AUTH_TOKEN>
  otlphttp/sentry:
    endpoint: https://o4511400113471488.ingest.de.sentry.io/api/4511400117010512/integration/otlp
    headers:
      authorization: "${env:OTEL_AUTH_HEADER}"

  # Debug exporter for troubleshooting (remove in production)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [filter, batch]
      exporters: [otlphttp/sentry]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/sentry]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/sentry]

  extensions: []
