openapi: "3.0.3"

info:
  title: HookSniff API
  version: "1.0.0"
  description: |
    Webhook delivery, monitoring, and management API.
    All endpoints under `/v1` require authentication via `Authorization: Bearer <api_key>` header
    unless marked as **Public**.
  contact:
    name: HookSniff Support
    email: support@hooksniff.vercel.app
    url: https://hooksniff.vercel.app
  license:
    name: Proprietary

servers:
  - url: https://hooksniff-api-1046140057667.europe-west1.run.app/v1
    description: Production (Google Cloud Run)
  - url: http://localhost:3000/v1
    description: Local development

tags:
  - name: Auth
    description: Registration, login, password reset, email verification, 2FA
  - name: Endpoints
    description: Manage webhook destination endpoints
  - name: Webhooks
    description: Send and manage webhook deliveries
  - name: API Keys
    description: Manage API keys
  - name: Alerts
    description: Alert rules and notifications
  - name: Analytics
    description: Delivery trends, success rates, latency metrics
  - name: Stats
    description: Account usage statistics
  - name: Search
    description: Search webhook deliveries
  - name: Inbound
    description: Receive webhooks from external providers
  - name: Notifications
    description: In-app notification management
  - name: Devices
    description: Push notification device tokens
  - name: Teams
    description: Team management and invitations
  - name: Billing
    description: Subscription, usage, invoices, payment webhooks
  - name: Templates
    description: Webhook payload templates
  - name: Schemas
    description: JSON Schema registry and validation
  - name: Routing
    description: Smart routing configuration per endpoint
  - name: Playground
    description: Test webhooks in sandbox
  - name: Transforms
    description: Payload transformation rules
  - name: Stream
    description: Real-time delivery event stream (SSE)
  - name: Admin
    description: Admin-only user and system management
  - name: Contact
    description: Contact form submission
  - name: Outbound IPs
    description: Static IPs for firewall whitelisting
  - name: Health
    description: System health and status
  - name: Customer Portal
    description: Self-service customer portal
  - name: Delivery Details
    description: Detailed delivery and attempt info

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API key passed as Bearer token

  schemas:
    # ── Common ──
    Error:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
      required: [error]

    Uuid:
      type: string
      format: uuid

    DateTime:
      type: string
      format: date-time

    # ── Auth ──
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
      required: [email]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT access token
        customer:
          $ref: "#/components/schemas/CustomerResponse"
        refresh_token:
          type: string
          description: Refresh token (when applicable)

    TwoFactorRequiredResponse:
      type: object
      properties:
        requires_2fa:
          type: boolean
          example: true
        temp_token:
          type: string
        message:
          type: string

    CustomerResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        email:
          type: string
        name:
          type: string
          nullable: true
        api_key:
          type: string
          description: Only returned on registration
          nullable: true
        plan:
          type: string
          enum: [free, pro, business]
        webhook_limit:
          type: integer
        webhook_count:
          type: integer
        is_admin:
          type: boolean
        created_at:
          $ref: "#/components/schemas/DateTime"

    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]

    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8
      required: [token, new_password]

    VerifyEmailRequest:
      type: object
      properties:
        token:
          type: string
      required: [token]

    ResendVerificationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]

    RefreshTokenRequest:
      type: object
      properties:
        refresh_token:
          type: string
      required: [refresh_token]

    Verify2faRequest:
      type: object
      properties:
        temp_token:
          type: string
        code:
          type: string
          minLength: 6
          maxLength: 6
      required: [temp_token, code]

    Enable2faRequest:
      type: object
      properties:
        password:
          type: string
      required: [password]

    Confirm2faRequest:
      type: object
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 6
      required: [code]

    Disable2faRequest:
      type: object
      properties:
        password:
          type: string
      required: [password]

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
      required: [name, email]

    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8
      required: [current_password, new_password]

    # ── Endpoints ──
    Endpoint:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        url:
          type: string
          format: uri
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
        retry_policy:
          $ref: "#/components/schemas/RetryPolicy"
        created_at:
          $ref: "#/components/schemas/DateTime"
        allowed_ips:
          type: array
          items:
            type: string
          nullable: true
          description: CIDR blocks or exact IPs
        event_filter:
          type: array
          items:
            type: string
          nullable: true
          description: Wildcard patterns (e.g. "order.*")
        custom_headers:
          type: object
          nullable: true
        routing_strategy:
          type: string
          enum: [round-robin, latency, failover]
        fallback_url:
          type: string
          format: uri
          nullable: true
        avg_response_ms:
          type: integer
        failure_streak:
          type: integer
        format:
          type: string
          enum: [standard, cloudevents]

    CreateEndpointRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
        description:
          type: string
        allowed_ips:
          type: array
          items:
            type: string
        event_filter:
          type: array
          items:
            type: string
        custom_headers:
          type: object
        retry_policy:
          $ref: "#/components/schemas/RetryPolicy"
        routing_strategy:
          type: string
          enum: [round-robin, latency, failover]
        fallback_url:
          type: string
          format: uri
        format:
          type: string
          enum: [standard, cloudevents]
          default: standard
      required: [url]

    UpdateEndpointRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
        description:
          type: string
        is_active:
          type: boolean
        allowed_ips:
          type: array
          items:
            type: string
        event_filter:
          type: array
          items:
            type: string
        custom_headers:
          type: object
        retry_policy:
          $ref: "#/components/schemas/RetryPolicy"
        routing_strategy:
          type: string
          enum: [round-robin, latency, failover]
        fallback_url:
          type: string
          format: uri
        format:
          type: string
          enum: [standard, cloudevents]

    RetryPolicy:
      type: object
      properties:
        max_attempts:
          type: integer
          default: 3
        backoff:
          type: string
          enum: [exponential, linear, fixed]
          default: exponential
        initial_delay_secs:
          type: integer
          default: 10
        max_delay_secs:
          type: integer
          default: 3600

    # ── Webhooks / Deliveries ──
    CreateWebhookRequest:
      type: object
      properties:
        endpoint_id:
          $ref: "#/components/schemas/Uuid"
        event:
          type: string
          description: Event type (e.g. "order.created")
        data:
          type: object
          description: Webhook payload
      required: [endpoint_id, data]

    BatchWebhookRequest:
      type: object
      properties:
        webhooks:
          type: array
          items:
            $ref: "#/components/schemas/CreateWebhookRequest"
      required: [webhooks]

    Delivery:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        endpoint_id:
          $ref: "#/components/schemas/Uuid"
        event:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, processing, delivered, failed]
        attempt_count:
          type: integer
        response_status:
          type: integer
          nullable: true
        replay_count:
          type: integer
        created_at:
          $ref: "#/components/schemas/DateTime"

    DeliveryListResponse:
      type: object
      properties:
        deliveries:
          type: array
          items:
            $ref: "#/components/schemas/Delivery"
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer

    BatchResponse:
      type: object
      properties:
        deliveries:
          type: array
          items:
            $ref: "#/components/schemas/Delivery"
        errors:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              error:
                type: string

    DeliveryAttempt:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        attempt_number:
          type: integer
        status_code:
          type: integer
          nullable: true
        response_body:
          type: string
          nullable: true
        duration_ms:
          type: integer
          nullable: true
        error_message:
          type: string
          nullable: true
        created_at:
          $ref: "#/components/schemas/DateTime"

    BatchReplayRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            $ref: "#/components/schemas/Uuid"
      required: [ids]

    # ── API Keys ──
    ApiKeyInfo:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        prefix:
          type: string
          description: Masked key prefix (e.g. "hs_abc1...")
        created_at:
          type: string
        last_used_at:
          type: string
          nullable: true
        is_active:
          type: boolean

    CreateApiKeyResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        key:
          type: string
          description: Full API key — only shown once
        prefix:
          type: string
        message:
          type: string

    # ── Alerts ──
    AlertRule:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        name:
          type: string
        condition:
          type: string
          enum: [failure_rate, latency, consecutive_failures]
        threshold:
          type: integer
        channels:
          type: array
          items:
            type: string
            enum: [slack, email, webhook]
        is_active:
          type: boolean
        created_at:
          type: string

    CreateAlertRequest:
      type: object
      properties:
        name:
          type: string
        condition:
          type: string
          enum: [failure_rate, latency, consecutive_failures]
        threshold:
          type: integer
        channels:
          type: array
          items:
            type: string
        endpoint_id:
          $ref: "#/components/schemas/Uuid"
      required: [name, condition, threshold, channels]

    # ── Analytics ──
    DeliveryTrendResponse:
      type: object
      properties:
        range:
          type: string
        buckets:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
              successful:
                type: integer
              failed:
                type: integer
              total:
                type: integer

    SuccessRateResponse:
      type: object
      properties:
        range:
          type: string
        successful:
          type: integer
        failed:
          type: integer
        pending:
          type: integer
        success_rate:
          type: number
          format: double

    LatencyTrendResponse:
      type: object
      properties:
        range:
          type: string
        buckets:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
              avg_ms:
                type: number
              p95_ms:
                type: number
        overall_avg_ms:
          type: number

    # ── Stats ──
    StatsResponse:
      type: object
      properties:
        total_deliveries:
          type: integer
        successful_deliveries:
          type: integer
        failed_deliveries:
          type: integer
        total_endpoints:
          type: integer
        active_endpoints:
          type: integer
        plan:
          type: string
        webhook_limit:
          type: integer
        webhook_count:
          type: integer

    # ── Search ──
    SearchResult:
      type: object
      properties:
        deliveries:
          type: array
          items:
            $ref: "#/components/schemas/Delivery"
        total:
          type: integer

    # ── Notifications ──
    Notification:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        title:
          type: string
        body:
          type: string
        is_read:
          type: boolean
        link:
          type: string
          nullable: true
        created_at:
          $ref: "#/components/schemas/DateTime"

    NotificationListResponse:
      type: object
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        total:
          type: integer
        unread_count:
          type: integer

    # ── Devices ──
    RegisterDeviceRequest:
      type: object
      properties:
        token:
          type: string
          description: FCM device token
        platform:
          type: string
          enum: [android, ios, web]
      required: [token]

    DeviceTokenResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        token:
          type: string
        platform:
          type: string
        created_at:
          $ref: "#/components/schemas/DateTime"

    # ── Teams ──
    Team:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        name:
          type: string
        created_at:
          $ref: "#/components/schemas/DateTime"

    CreateTeamRequest:
      type: object
      properties:
        name:
          type: string
      required: [name]

    InviteRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, member, viewer]
      required: [email]

    ChangeRoleRequest:
      type: object
      properties:
        role:
          type: string
          enum: [admin, member, viewer]
      required: [role]

    TeamDetailResponse:
      type: object
      properties:
        team:
          $ref: "#/components/schemas/Team"
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"
        invites:
          type: array
          items:
            $ref: "#/components/schemas/TeamInvite"

    TeamMember:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        user_id:
          $ref: "#/components/schemas/Uuid"
        email:
          type: string
        name:
          type: string
          nullable: true
        role:
          type: string
        joined_at:
          $ref: "#/components/schemas/DateTime"

    TeamInvite:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        email:
          type: string
        role:
          type: string
        created_at:
          $ref: "#/components/schemas/DateTime"

    # ── Billing ──
    SubscriptionResponse:
      type: object
      properties:
        plan:
          type: string
        status:
          type: string
        payment_provider:
          type: string
        webhook_limit:
          type: integer
        endpoint_limit:
          type: integer
        retention_days:
          type: integer
        monthly_price_cents:
          type: integer

    UpgradeRequest:
      type: object
      properties:
        plan:
          type: string
          enum: [pro, business]
        provider:
          type: string
          enum: [stripe, polar, iyzico]
      required: [plan]

    UpgradeResponse:
      type: object
      properties:
        checkout_url:
          type: string
          nullable: true
        provider:
          type: string
        message:
          type: string

    UsageResponse:
      type: object
      properties:
        plan:
          type: string
        period_start:
          $ref: "#/components/schemas/DateTime"
        period_end:
          $ref: "#/components/schemas/DateTime"
        webhooks_used:
          type: integer
        webhooks_limit:
          type: integer
        endpoints_used:
          type: integer
        endpoints_limit:
          type: integer

    InvoiceResponse:
      type: object
      properties:
        id:
          type: string
        amount_cents:
          type: integer
        currency:
          type: string
        status:
          type: string
        created_at:
          $ref: "#/components/schemas/DateTime"

    # ── Templates ──
    WebhookTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        payload_template:
          type: object

    ApplyTemplateRequest:
      type: object
      properties:
        endpoint_id:
          $ref: "#/components/schemas/Uuid"
        variables:
          type: object
      required: [endpoint_id]

    ApplyTemplateResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    # ── Schemas ──
    RegisterSchemaRequest:
      type: object
      properties:
        name:
          type: string
        schema:
          type: object
          description: JSON Schema document
      required: [name, schema]

    ValidateEventRequest:
      type: object
      properties:
        event:
          type: object
      required: [event]

    # ── Routing ──
    RoutingInfo:
      type: object
      properties:
        endpoint_id:
          $ref: "#/components/schemas/Uuid"
        routing_strategy:
          type: string
        fallback_url:
          type: string
          nullable: true
        avg_response_ms:
          type: integer
        failure_streak:
          type: integer
        is_healthy:
          type: boolean

    UpdateRoutingRequest:
      type: object
      properties:
        routing_strategy:
          type: string
          enum: [round-robin, latency, failover]
        fallback_url:
          type: string
          format: uri

    EndpointHealth:
      type: object
      properties:
        endpoint_id:
          $ref: "#/components/schemas/Uuid"
        is_healthy:
          type: boolean
        failure_streak:
          type: integer
        avg_response_ms:
          type: integer
        last_failure_at:
          $ref: "#/components/schemas/DateTime"
          nullable: true

    # ── Playground ──
    TestWebhookRequest:
      type: object
      properties:
        endpoint_id:
          $ref: "#/components/schemas/Uuid"
        payload:
          type: object
        event:
          type: string
      required: [endpoint_id, payload]

    TestWebhookResponse:
      type: object
      properties:
        success:
          type: boolean
        status_code:
          type: integer
        duration_ms:
          type: integer
        response_body:
          type: string

    # ── Transforms ──
    TransformRule:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        endpoint_id:
          $ref: "#/components/schemas/Uuid"
        name:
          type: string
        rule_type:
          type: string
        config:
          type: object
        is_active:
          type: boolean
        created_at:
          $ref: "#/components/schemas/DateTime"

    CreateTransformRuleRequest:
      type: object
      properties:
        name:
          type: string
        rule_type:
          type: string
        config:
          type: object
      required: [name, rule_type, config]

    # ── Contact ──
    ContactRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        subject:
          type: string
        message:
          type: string
      required: [name, email, subject, message]

    ContactResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    # ── Outbound IPs ──
    OutboundIpsResponse:
      type: object
      properties:
        ips:
          type: array
          items:
            type: string
        updated_at:
          type: string

    # ── Health ──
    SystemStatus:
      type: object
      properties:
        overall_status:
          type: string
          enum: [operational, degraded, down]
        uptime_30d:
          type: number
        components:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
              latency_ms:
                type: integer
                nullable: true
              description:
                type: string
              last_checked:
                type: string
        checked_at:
          type: string

    # ── Notification Preferences ──
    NotificationPreferences:
      type: object
      properties:
        email_on_failure:
          type: boolean
          default: true
        email_on_dead_letter:
          type: boolean
          default: true
        email_on_success:
          type: boolean
          default: false
        slack_webhook_url:
          type: string
          nullable: true
        discord_webhook_url:
          type: string
          nullable: true
        webhook_url:
          type: string
          nullable: true

    UpdateNotificationPreferences:
      type: object
      properties:
        email_on_failure:
          type: boolean
        email_on_dead_letter:
          type: boolean
        email_on_success:
          type: boolean
        slack_webhook_url:
          type: string
          nullable: true
        discord_webhook_url:
          type: string
          nullable: true
        webhook_url:
          type: string
          nullable: true

    # ── Customer Portal ──
    PortalProfile:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        email:
          type: string
        name:
          type: string
          nullable: true
        plan:
          type: string
        created_at:
          $ref: "#/components/schemas/DateTime"

    # ── Admin ──
    PaginatedUsers:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserSummary"
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer

    UserSummary:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        email:
          type: string
        name:
          type: string
          nullable: true
        plan:
          type: string
        is_active:
          type: boolean
        created_at:
          $ref: "#/components/schemas/DateTime"

    SystemStats:
      type: object
      properties:
        total_users:
          type: integer
        active_users:
          type: integer
        total_endpoints:
          type: integer
        total_deliveries:
          type: integer
        plan_breakdown:
          type: array
          items:
            type: object
            properties:
              plan:
                type: string
              count:
                type: integer

    # ── Stream ──
    StreamParams:
      type: object
      properties:
        endpoint_id:
          $ref: "#/components/schemas/Uuid"
        status:
          type: string
          enum: [pending, processing, delivered, failed]
        limit:
          type: integer
          default: 50

security:
  - BearerAuth: []

paths:
  # ══════════════════════════════════════
  # AUTH
  # ══════════════════════════════════════
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new account
      security: []
      requestBody:
        required: true
        content:
          application/json:
