            $ref: '#/components/schemas/EventType'
        has_more:
          type: boolean
        total:
          type: integer
      required:
      - data
      - has_more
      - total
    EmbedConfig:
      type: object
      description: Configuration for embedded webhook dashboard
      properties:
        allowed_origins:
          type: array
          items:
            type: string
          description: CORS origins allowed to load the embed
        theme:
          type: object
          properties:
            primary_color:
              type: string
            background_color:
              type: string
            font_family:
              type: string
          description: Visual customization for the embed
        features:
          type: array
          items:
            type: string
          description: Enabled features (e.g. [deliveries, endpoints, playground])
      required:
      - allowed_origins
    SimulatorRequest:
      type: object
      description: Send a simulated webhook event
      properties:
        endpoint_id:
          $ref: '#/components/schemas/Uuid'
        event_type:
          type: string
          description: Event type to simulate (e.g. order.created)
        payload:
          type: object
          description: The webhook payload to deliver
        delay_ms:
          type: integer
          nullable: true
          description: Artificial delay before delivery (for testing timeouts)
      required:
      - endpoint_id
      - event_type
      - payload
    SimulatorResponse:
      type: object
      description: Result of a simulated webhook delivery
      properties:
        delivery_id:
          $ref: '#/components/schemas/Uuid'
        status:
          type: string
          enum:
          - delivered
          - failed
          - pending
        latency_ms:
          type: integer
          description: Response time from the endpoint
      required:
      - delivery_id
      - status
      - latency_ms
    PlaygroundTestRequest:
      type: object
      description: Test a webhook payload against an endpoint in sandbox
      properties:
        endpoint_id:
          $ref: '#/components/schemas/Uuid'
        payload:
          type: object
          description: The payload to send
        headers:
          type: object
          nullable: true
          description: Custom headers to include with the request
      required:
      - endpoint_id
      - payload
    PlaygroundTestResponse:
      type: object
      description: Result of a playground test delivery
      properties:
        status_code:
          type: integer
          description: HTTP status code returned by the endpoint
        response_body:
          type: string
          description: Raw response body from the endpoint
        latency_ms:
          type: integer
        headers:
          type: object
          description: Response headers from the endpoint
      required:
      - status_code
      - response_body
      - latency_ms
    TransformRuleListResponse:
      type: object
      description: Paginated list of transform rules
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TransformRule'
      required:
      - data
    UpdateTransformRuleRequest:
      type: object
      description: Update an existing transform rule (all fields optional)
      properties:
        name:
          type: string
        config:
          type: object
          description: Updated transformation configuration
    OutboundIPsResponse:
      type: object
      description: List of static outbound IP addresses for firewall whitelisting
      properties:
        ips:
          type: array
          items:
            type: string
          description: IPv4 and IPv6 addresses used for outbound requests
      required:
      - ips
