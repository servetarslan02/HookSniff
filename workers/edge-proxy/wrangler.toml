name = "hooksniff-edge-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# ── Environment ──
[vars]
API_BASE = "https://hooksniff-api-sdjufmaqka-ew.a.run.app"
API_BASE_EU = "https://hooksniff-api-sdjufmaqka-ey.a.run.app"
API_BASE_ME = "https://hooksniff-api-sdjufmaqka-zf.a.run.app"
API_BASE_US = "https://hooksniff-api-sdjufmaqka-uc.a.run.app"
ENVIRONMENT = "production"

# ── KV Namespaces (for rate limiting & edge caching) ──
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "3f97bfb0219e4625a9315fc30086ac96"

[[kv_namespaces]]
binding = "EDGE_CACHE_KV"
id = "f554e503fcbe4d548b8df187456078b3"

# ── Durable Objects (for distributed rate limiting) ──
# [durable_objects]
# bindings = [{name = "RATE_LIMITER", class_name = "RateLimiter"}]

# ── Routes (all API traffic through edge) ──
# Uncomment after DNS setup:
# routes = [
#   { pattern = "api.hooksniff.com/*", zone_name = "hooksniff.com" }
# ]

# ── Custom domains ──
# [env.production]
# routes = [
#   { pattern = "api.hooksniff.com/*", zone_name = "hooksniff.com" }
# ]
