# HookSniff — Render Blueprint
# ═══════════════════════════════════════
# One-click deploy to Render.
#
# Usage:
#   1. Push this file to GitHub
#   2. Go to https://dashboard.render.com/blueprints
#   3. Connect your GitHub repo
#   4. Render will detect this file and create services
#
# Or use the Render API:
#   curl -X POST https://api.render.com/v1/blueprint-registrations \
#     -H "Authorization: Bearer <YOUR_API_KEY>" \
#     -d '{"repo": "https://github.com/servetarslan02/HookSniff", "branch": "main"}'

services:
  # ── HookSniff API ──
  - type: web
    name: hooksniff-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    region: frankfurt  # Closest to Turkey
    plan: free
    branch: main
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: RUST_LOG
        value: info,hooksniff=debug
      - key: LOG_FORMAT
        value: json
      - key: DATABASE_URL
        sync: false  # Set in Render dashboard
      - key: REDIS_URL
        sync: false
      - key: HMAC_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: RETENTION_DAYS
        value: "7"
      - key: CORS_ORIGINS
        value: https://hooksniff.vercel.app,https://hooksniff.vercel.app
      - key: APP_URL
        value: https://hooksniff.vercel.app
      - key: RATE_LIMIT_STORE
        value: redis
      - key: POLAR_ACCESS_TOKEN
        sync: false
      - key: POLAR_WEBHOOK_SECRET
        sync: false
      - key: POLAR_PRODUCT_PRO
        value: ec5826ad-4a01-4146-b2d0-3b99eaf150a5
      - key: POLAR_PRODUCT_BUSINESS
        value: e5b7d88a-7606-4963-a070-4102ca6405e2
      - key: POLAR_ENV
        value: production
        sync: false
      - key: NOTIFY_FROM_EMAIL
        value: noreply@hooksniff.vercel.app
      - key: NOTIFY_EMAIL
        value: support@hooksniff.vercel.app
      - key: WEBHOOK_FORMAT
        value: standard
      - key: WEBHOOK_TIMESTAMP_TOLERANCE_SECS
        value: "300"
      - key: MAX_PAYLOAD_BYTES
        value: "1048576"
      - key: OTEL_ENABLED
        value: "false"  # Enable after Grafana setup
    healthCheckPath: /health

  # ── HookSniff Worker ──
  - type: worker
    name: hooksniff-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    region: frankfurt
    plan: free
    branch: main
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: RUST_LOG
        value: info,hooksniff=debug
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NOTIFY_FROM_EMAIL
        value: noreply@hooksniff.vercel.app
        sync: false
      - key: OTEL_ENABLED
        value: "false"
