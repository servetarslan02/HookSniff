# Cloud Build: Build and deploy HookSniff API to Cloud Run
timeout: 1200s

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.api'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff-repo/hooksniff-api:$SHORT_SHA'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff-repo/hooksniff-api:latest'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff-repo/hooksniff-api'
    waitFor: ['build']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hooksniff-api'
      - '--image=europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff-repo/hooksniff-api:$SHORT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=2'
      - '--set-secrets=DATABASE_URL=hooksniff-database-url:latest,ENCRYPTION_KEY=encryption-key:latest,JWT_SECRET=hooksniff-jwt-secret:latest,POLAR_ACCESS_TOKEN=hooksniff-polar-token:latest,POLAR_WEBHOOK_SECRET=hooksniff-polar-webhook-secret:latest,RESEND_API_KEY=hooksniff-resend-api-key:latest,HMAC_SECRET=hooksniff-hmac-secret:latest,GMAIL_ADDRESS=hooksniff-gmail-address:latest,GMAIL_APP_PASSWORD=hooksniff-gmail-app-password:latest'
      - '--set-env-vars=APP_ENV=production,PORT=8080,RUST_LOG=info'
    waitFor: ['push']

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff-repo/hooksniff-api:$SHORT_SHA'
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff-repo/hooksniff-api:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/hooksniff-database-url/versions/latest
      env: DATABASE_URL
    - versionName: projects/$PROJECT_ID/secrets/encryption-key/versions/latest
      env: ENCRYPTION_KEY
    - versionName: projects/$PROJECT_ID/secrets/hooksniff-jwt-secret/versions/latest
      env: JWT_SECRET
    - versionName: projects/$PROJECT_ID/secrets/hooksniff-polar-token/versions/latest
      env: POLAR_ACCESS_TOKEN
    - versionName: projects/$PROJECT_ID/secrets/hooksniff-polar-webhook-secret/versions/latest
      env: POLAR_WEBHOOK_SECRET
    - versionName: projects/$PROJECT_ID/secrets/hooksniff-resend-api-key/versions/latest
      env: RESEND_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/hooksniff-hmac-secret/versions/latest
      env: HMAC_SECRET
    - versionName: projects/$PROJECT_ID/secrets/hooksniff-gmail-address/versions/latest
      env: GMAIL_ADDRESS
    - versionName: projects/$PROJECT_ID/secrets/hooksniff-gmail-app-password/versions/latest
      env: GMAIL_APP_PASSWORD
