# HookSniff Helm Chart — Default Values

replicaCount: 1

# ── API ──
api:
  image:
    repository: hooksniff-api
    tag: latest
    pullPolicy: IfNotPresent
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Worker ──
worker:
  image:
    repository: hooksniff-worker
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Dashboard ──
dashboard:
  image:
    repository: hooksniff-dashboard
    tag: latest
    pullPolicy: IfNotPresent
  port: 3001
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ── PostgreSQL ──
postgresql:
  enabled: true
  auth:
    postgresPassword: hooksniff
    database: hooksniff
  primary:
    persistence:
      enabled: true
      size: 5Gi

# ── Redis ──
redis:
  enabled: true
  auth:
    enabled: true
  master:
    persistence:
      enabled: true
      size: 1Gi

# ── Environment ──
# Item 39: Secrets moved to Kubernetes Secret resource.
# Create secrets via: kubectl create secret generic hooksniff-secrets --from-literal=...
# Or use: deploy/helm/hooksniff/templates/secrets.yaml (external secret manager recommended)
env:
  API_BASE_URL: "http://localhost:3000"
  DASHBOARD_URL: "http://localhost:3001"
  # JWT_SECRET, HMAC_SECRET — referenced from K8s Secret via envFrom
  # See templates/secrets.yaml for secret injection

# ── Kubernetes Secrets Reference ──
# Injects secrets from the 'hooksniff-secrets' K8s Secret into env vars.
# Create the secret before deploying:
#   kubectl create secret generic hooksniff-secrets \
#     --from-literal=JWT_SECRET=<your-jwt-secret> \
#     --from-literal=HMAC_SECRET=<your-hmac-secret> \
#     --from-literal=DATABASE_URL=<your-db-url> \
#     --from-literal=REDIS_URL=<your-redis-url>
secretRef:
  name: hooksniff-secrets

# ── Ingress ──
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: hooksniff.example.com
      paths:
        - path: /
          pathType: Prefix
          service: dashboard
        - path: /v1
          pathType: Prefix
          service: api
  tls: []

# ── Service ──
service:
  api:
    type: ClusterIP
    port: 3000
  dashboard:
    type: ClusterIP
    port: 3001
