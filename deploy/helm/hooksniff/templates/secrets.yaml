# Item 39: Kubernetes Secret for sensitive configuration.
# In production, use an external secret manager (e.g., Sealed Secrets, External Secrets Operator).
# Create manually before deploying:
#   kubectl create secret generic hooksniff-secrets \
#     --from-literal=JWT_SECRET=<value> \
#     --from-literal=HMAC_SECRET=<value> \
#     --from-literal=DATABASE_URL=<value> \
#     --from-literal=REDIS_URL=<value>
#
# This template is a placeholder — DO NOT commit real secrets to version control.
# For production, use External Secrets Operator or Sealed Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretRef.name | default "hooksniff-secrets" }}
  labels:
    app.kubernetes.io/name: hooksniff
    app.kubernetes.io/part-of: hooksniff
type: Opaque
