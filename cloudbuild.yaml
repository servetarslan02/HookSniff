timeout: 3600s

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

steps:
  # Step 1: Pre-build Rust Check (Fast Fail)
  - name: 'rust:1.95-bookworm'
    id: 'rust-check'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        apt-get update && apt-get install -y pkg-config cmake
        cargo check --workspace
    waitFor: ['-']

  # Step 2: Run database migrations
  - name: 'node:22-slim'
    id: 'run-migrations'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm install --no-audit --no-fund pg
        node run-migrations.js || echo "⚠️ Migration skipped (DB quota or connection issue)"
    secretEnv: ['DATABASE_URL']
    waitFor: ['-']

  # Step 3: Build API image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-api'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.api'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/api:$BUILD_ID'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/api:latest'
      - '.'
    waitFor: ['rust-check']

  # Step 4: Build Worker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-worker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.worker'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/worker:$BUILD_ID'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/worker:latest'
      - '.'
    waitFor: ['rust-check']

  # Step 5: Push API image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-api'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/api:latest'
    waitFor: ['build-api']

  # Step 7: Push Worker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-worker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/worker:latest'
    waitFor: ['build-worker']

  # Step 7: Deploy API to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-api'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hooksniff-api'
      - '--image=europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/api:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=3'
      - '--timeout=300'
      - '--startup-probe=httpGet.port=3000,httpGet.path=/health,initialDelaySeconds=10,periodSeconds=5,failureThreshold=12,timeoutSeconds=5'
      - '--set-env-vars=APP_ENV=production,RUST_LOG=info,LOG_FORMAT=json,WEBHOOK_FORMAT=standard,MAX_PAYLOAD_BYTES=1048576,RETENTION_DAYS=30,WEBHOOK_TIMESTAMP_TOLERANCE_SECS=300,RATE_LIMIT_STORE=redis,OTEL_ENABLED=true,OTEL_EXPORTER_OTLP_ENDPOINT=https://o4511400113471488.ingest.de.sentry.io/api/4511400117010512/integration/otlp,CORS_ORIGINS=https://hooksniff.vercel.app,APP_URL=https://hooksniff.vercel.app,NOTIFY_EMAIL=support@hooksniff.vercel.app,NOTIFY_FROM_EMAIL=noreply@hooksniff.vercel.app,POLAR_ENV=production,USE_REDIS_QUEUE=true,QSTASH_URL=https://qstash-eu-central-1.upstash.io,GITHUB_CLIENT_ID=REDACTED_GITHUB_CLIENT_ID,GOOGLE_CLIENT_ID=499907444852-a3tgngi30sjhj442epjt0ms7vd7brjb9.apps.googleusercontent.com'
      - '--set-secrets=DATABASE_URL=hooksniff-database-url:latest,REDIS_URL=hooksniff-redis-url:latest,JWT_SECRET=hooksniff-jwt-secret:latest,HMAC_SECRET=hooksniff-hmac-secret:latest,POLAR_ACCESS_TOKEN=hooksniff-polar-token:latest,POLAR_WEBHOOK_SECRET=hooksniff-polar-webhook-secret:latest,RESEND_API_KEY=hooksniff-resend-api-key:latest,OTEL_EXPORTER_OTLP_HEADERS=hooksniff-otel-headers:latest,ENCRYPTION_KEY=encryption-key:latest,POLAR_PRODUCT_PRO=hooksniff-polar-product-pro:latest,POLAR_PRODUCT_BUSINESS=hooksniff-polar-product-business:latest,QSTASH_TOKEN=hooksniff-qstash-token:latest,QSTASH_CURRENT_SIGNING_KEY=hooksniff-qstash-current-key:latest,QSTASH_NEXT_SIGNING_KEY=hooksniff-qstash-next-key:latest,GITHUB_CLIENT_SECRET=hooksniff-github-secret:latest,GOOGLE_CLIENT_SECRET=hooksniff-google-secret:latest'
      - '--project=$PROJECT_ID'
      - '--quiet'
    waitFor: ['push-api', 'run-migrations']

  # Step 10: Deploy Worker to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-worker'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hooksniff-worker'
      - '--image=europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/worker:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=4'
      - '--timeout=300'
      - '--no-startup-probe'
      - '--set-env-vars=APP_ENV=production,RUST_LOG=info,LOG_FORMAT=json,OTEL_ENABLED=true,OTEL_EXPORTER_OTLP_ENDPOINT=https://o4511400113471488.ingest.de.sentry.io/api/4511400117010512/integration/otlp,WEBHOOK_FORMAT=standard,RATE_LIMIT_STORE=redis,RETENTION_DAYS=30,WEBHOOK_TIMESTAMP_TOLERANCE_SECS=300,NOTIFY_FROM_EMAIL=noreply@hooksniff.vercel.app,USE_REDIS_QUEUE=true'
      - '--set-secrets=DATABASE_URL=hooksniff-database-url:latest,REDIS_URL=hooksniff-redis-url:latest,HMAC_SECRET=hooksniff-hmac-secret:latest,OTEL_EXPORTER_OTLP_HEADERS=hooksniff-otel-headers:latest,ENCRYPTION_KEY=encryption-key:latest'
      - '--project=$PROJECT_ID'
      - '--quiet'
    waitFor: ['push-worker', 'run-migrations']

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/api:latest'
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/worker:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/hooksniff-database-url/versions/latest
      env: DATABASE_URL

