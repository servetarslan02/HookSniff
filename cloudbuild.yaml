timeout: 3600s

steps:
  # Step 1: Pre-build Rust Check (Fast Fail)
  - name: 'rust:1.95-bookworm'
    id: 'rust-check'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        apt-get update && apt-get install -y pkg-config cmake
        cargo check --workspace
    waitFor: ['-']

  # Step 2: Run database migrations
  - name: 'node:22-slim'
    id: 'run-migrations'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm install --no-audit --no-fund pg
        node run-migrations.js || echo "⚠️ Migration skipped (DB quota or connection issue)"
    secretEnv: ['DATABASE_URL']
    waitFor: ['-']

  # Step 3: Build API image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-api'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.api'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/api:$SHORT_SHA'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/api:latest'
      - '.'
    waitFor: ['rust-check']

  # Step 4: Build Worker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-worker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.worker'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/worker:$SHORT_SHA'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/worker:latest'
      - '.'
    waitFor: ['rust-check']

  # Step 5: Build Dashboard image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-dashboard'
    args:
      - 'build'
      - '--no-cache'
      - '-f'
      - 'Dockerfile.dashboard'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/dashboard:$SHORT_SHA'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/dashboard:latest'
      - '.'
    waitFor: ['-']

  # Step 6: Push API image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-api'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/api:latest'
    waitFor: ['build-api']

  # Step 7: Push Worker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-worker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/worker:latest'
    waitFor: ['build-worker']

  # Step 8: Push Dashboard image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-dashboard'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/dashboard:latest'
    waitFor: ['build-dashboard']

  # Step 9: Deploy API to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-api'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hooksniff-api'
      - '--image=europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/api:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=3'
      - '--timeout=300'
      - '--startup-probe=httpGet.port=3000,httpGet.path=/health,initialDelaySeconds=10,periodSeconds=5,failureThreshold=12,timeoutSeconds=5'
      - '--set-env-vars=APP_ENV=production,RUST_LOG=info,LOG_FORMAT=json,WEBHOOK_FORMAT=standard,MAX_PAYLOAD_BYTES=1048576,RETENTION_DAYS=30,WEBHOOK_TIMESTAMP_TOLERANCE_SECS=300,RATE_LIMIT_STORE=redis,OTEL_ENABLED=true'
      - '--set-secrets=DATABASE_URL=hooksniff-database-url:latest,REDIS_URL=hooksniff-redis-url:latest,JWT_SECRET=hooksniff-jwt-secret:latest,HMAC_SECRET=hooksniff-hmac-secret:latest,POLAR_ACCESS_TOKEN=hooksniff-polar-token:latest,POLAR_WEBHOOK_SECRET=hooksniff-polar-webhook-secret:latest,RESEND_API_KEY=hooksniff-resend-api-key:latest,OTEL_EXPORTER_OTLP_HEADERS=hooksniff-otel-headers:latest,ENCRYPTION_KEY=encryption-key:latest'
      - '--project=$PROJECT_ID'
      - '--quiet'
    waitFor: ['push-api', 'run-migrations']

  # Step 10: Deploy Worker to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-worker'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hooksniff-worker'
      - '--image=europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/worker:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=4'
      - '--startup-probe=httpGet.port=8080,httpGet.path=/health,initialDelaySeconds=10,periodSeconds=5,failureThreshold=12,timeoutSeconds=5'
      - '--set-env-vars=APP_ENV=production,RUST_LOG=info,LOG_FORMAT=json,OTEL_ENABLED=true'
      - '--set-secrets=DATABASE_URL=hooksniff-database-url:latest,REDIS_URL=hooksniff-redis-url:latest,HMAC_SECRET=hooksniff-hmac-secret:latest,OTEL_EXPORTER_OTLP_HEADERS=hooksniff-otel-headers:latest,ENCRYPTION_KEY=encryption-key:latest'
      - '--project=$PROJECT_ID'
      - '--quiet'
    waitFor: ['push-worker', 'run-migrations']

  # Step 11: Deploy Dashboard to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-dashboard'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hooksniff-dashboard'
      - '--image=europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/dashboard:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3001'
      - '--memory=256Mi'
      - '--cpu=0.5'
      - '--min-instances=1'
      - '--max-instances=2'
      - '--set-env-vars=NEXT_PUBLIC_API_URL=https://hooksniff-api-1046140057667.europe-west1.run.app/v1,NODE_ENV=production'
      - '--project=$PROJECT_ID'
      - '--quiet'
    waitFor: ['push-dashboard', 'deploy-api']

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/api:latest'
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/worker:latest'
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hooksniff/dashboard:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/hooksniff-database-url/versions/latest
      env: DATABASE_URL
