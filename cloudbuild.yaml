steps:
  # Run database migrations
  - name: 'node:22-slim'
    id: 'run-migrations'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'npm install pg && node run-migrations.js'
    secretEnv: ['DATABASE_URL']

  # Build API image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '--no-cache', '-f', 'Dockerfile.api', '-t', 'europe-west1-docker.pkg.dev/hooksniff-app/hooksniff/api:latest', '.']
    id: 'build-api'

  # Build Worker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '--no-cache', '-f', 'Dockerfile.worker', '-t', 'europe-west1-docker.pkg.dev/hooksniff-app/hooksniff/worker:latest', '.']
    id: 'build-worker'

  # Push both images
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/hooksniff-app/hooksniff/api:latest']
    id: 'push-api'
    waitFor: ['build-api']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/hooksniff-app/hooksniff/worker:latest']
    id: 'push-worker'
    waitFor: ['build-worker']

  # Deploy API to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hooksniff-api'
      - '--image=europe-west1-docker.pkg.dev/hooksniff-app/hooksniff/api:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=3'
      - '--timeout=3600'
      - '--set-env-vars=APP_ENV=production,RUST_LOG=info,RATE_LIMIT_STORE=redis,LOG_FORMAT=json,WEBHOOK_FORMAT=standard,MAX_PAYLOAD_BYTES=1048576,RETENTION_DAYS=30,WEBHOOK_TIMESTAMP_TOLERANCE_SECS=300,APP_URL=https://hooksniff.vercel.app,CORS_ORIGINS=https://hooksniff.vercel.app,OTEL_ENABLED=true,OTEL_EXPORTER_OTLP_ENDPOINT=https://o4511400113471488.ingest.de.sentry.io/api/4511400117010512/integration/otlp,NOTIFY_EMAIL=servetarslan02@gmail.com,EVENT_PUBLISHER_ENABLED=true,WS_ENABLED=true,WS_MAX_CONNECTIONS=100,WS_MAX_CONNECTIONS_PER_USER=5,WS_HEARTBEAT_INTERVAL_SECS=30,WS_SHUTDOWN_TIMEOUT_SECS=10'
      - '--set-secrets=DATABASE_URL=neon-db-url:latest,REDIS_URL=upstash-redis-url:latest,JWT_SECRET=jwt-secret:latest,HMAC_SECRET=hmac-secret:latest,POLAR_ACCESS_TOKEN=polar-token:latest,POLAR_WEBHOOK_SECRET=polar-webhook:latest,POLAR_PRODUCT_PRO=polar-pro:latest,POLAR_PRODUCT_BUSINESS=polar-business:latest,OTEL_EXPORTER_OTLP_HEADERS=otel-headers:latest,GCP_SA_JSON=gcp-sa-json:latest,RESEND_API_KEY=resend-api-key:latest,ENCRYPTION_KEY=encryption-key:latest'
      - '--project=hooksniff-app'
    waitFor: ['push-api', 'run-migrations']

  # Deploy API to europe-west3 (Frankfurt)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hooksniff-api'
      - '--image=europe-west1-docker.pkg.dev/hooksniff-app/hooksniff/api:latest'
      - '--region=europe-west3'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=3'
      - '--timeout=3600'
      - '--set-env-vars=APP_ENV=production,RUST_LOG=info,RATE_LIMIT_STORE=redis,LOG_FORMAT=json,WEBHOOK_FORMAT=standard,MAX_PAYLOAD_BYTES=1048576,RETENTION_DAYS=30,WEBHOOK_TIMESTAMP_TOLERANCE_SECS=300,APP_URL=https://hooksniff.vercel.app,CORS_ORIGINS=https://hooksniff.vercel.app,OTEL_ENABLED=true,OTEL_EXPORTER_OTLP_ENDPOINT=https://o4511400113471488.ingest.de.sentry.io/api/4511400117010512/integration/otlp,NOTIFY_EMAIL=servetarslan02@gmail.com,EVENT_PUBLISHER_ENABLED=true,WS_ENABLED=true,WS_MAX_CONNECTIONS=100,WS_MAX_CONNECTIONS_PER_USER=5,WS_HEARTBEAT_INTERVAL_SECS=30,WS_SHUTDOWN_TIMEOUT_SECS=10'
      - '--set-secrets=DATABASE_URL=neon-db-url:latest,REDIS_URL=upstash-redis-url:latest,JWT_SECRET=jwt-secret:latest,HMAC_SECRET=hmac-secret:latest,POLAR_ACCESS_TOKEN=polar-token:latest,POLAR_WEBHOOK_SECRET=polar-webhook:latest,POLAR_PRODUCT_PRO=polar-pro:latest,POLAR_PRODUCT_BUSINESS=polar-business:latest,OTEL_EXPORTER_OTLP_HEADERS=otel-headers:latest,GCP_SA_JSON=gcp-sa-json:latest,RESEND_API_KEY=resend-api-key:latest,ENCRYPTION_KEY=encryption-key:latest'
      - '--project=hooksniff-app'
    waitFor: ['push-api', 'run-migrations']

  # Deploy API to me-west1 (Tel Aviv)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hooksniff-api'
      - '--image=europe-west1-docker.pkg.dev/hooksniff-app/hooksniff/api:latest'
      - '--region=me-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=3'
      - '--timeout=3600'
      - '--set-env-vars=APP_ENV=production,RUST_LOG=info,RATE_LIMIT_STORE=redis,LOG_FORMAT=json,WEBHOOK_FORMAT=standard,MAX_PAYLOAD_BYTES=1048576,RETENTION_DAYS=30,WEBHOOK_TIMESTAMP_TOLERANCE_SECS=300,APP_URL=https://hooksniff.vercel.app,CORS_ORIGINS=https://hooksniff.vercel.app,OTEL_ENABLED=true,OTEL_EXPORTER_OTLP_ENDPOINT=https://o4511400113471488.ingest.de.sentry.io/api/4511400117010512/integration/otlp,NOTIFY_EMAIL=servetarslan02@gmail.com,EVENT_PUBLISHER_ENABLED=true,WS_ENABLED=true,WS_MAX_CONNECTIONS=100,WS_MAX_CONNECTIONS_PER_USER=5,WS_HEARTBEAT_INTERVAL_SECS=30,WS_SHUTDOWN_TIMEOUT_SECS=10'
      - '--set-secrets=DATABASE_URL=neon-db-url:latest,REDIS_URL=upstash-redis-url:latest,JWT_SECRET=jwt-secret:latest,HMAC_SECRET=hmac-secret:latest,POLAR_ACCESS_TOKEN=polar-token:latest,POLAR_WEBHOOK_SECRET=polar-webhook:latest,POLAR_PRODUCT_PRO=polar-pro:latest,POLAR_PRODUCT_BUSINESS=polar-business:latest,OTEL_EXPORTER_OTLP_HEADERS=otel-headers:latest,GCP_SA_JSON=gcp-sa-json:latest,RESEND_API_KEY=resend-api-key:latest,ENCRYPTION_KEY=encryption-key:latest'
      - '--project=hooksniff-app'
    waitFor: ['push-api', 'run-migrations']

  # Deploy API to us-central1 (Iowa)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hooksniff-api'
      - '--image=europe-west1-docker.pkg.dev/hooksniff-app/hooksniff/api:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
