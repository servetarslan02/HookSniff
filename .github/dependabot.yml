# Dependabot — DEVRE DIŞI bırakıldı (Oturum 149)
# Sebep: Vercel Hobby plan günlük 100 deploy limiti aşıldı
# Her PR ayrı deploy tetikliyordu. Manuel güncellemeler yeterli.
# Tekrar açmak için: open-pull-requests-limit değerlerini 3 yap
version: 2
updates:
  # Rust (API + Worker)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "security"

  # Node.js (Dashboard)
  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "security"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
