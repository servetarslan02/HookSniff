name: OpenAPI Codegen

on:
  push:
    branches: [main]
    paths:
      - 'docs/openapi.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/openapi.yaml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: codegen-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install OpenAPI Generator CLI
        run: npm install -g @openapitools/openapi-generator-cli

      - name: Generate all SDKs
        run: bash scripts/generate-sdks.sh

      - name: Generate custom types (TS/Python/Go)
        run: python3 openapi-codegen.py all

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ No changes — SDKs are up to date"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 Changes detected:"
            git diff --stat
          fi

      - name: Commit & push
        if: steps.changes.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sdks/
          git commit -m "chore: regenerate SDKs from OpenAPI spec [skip ci]

          Auto-generated by OpenAPI Codegen workflow.
          Triggered by changes to docs/openapi.yaml."
          git push

      - name: Comment on PR
        if: steps.changes.outputs.changed == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const stats = execSync('git diff --stat').toString();
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔄 OpenAPI Codegen\n\nSDK types regenerated from \`docs/openapi.yaml\`:\n\n\`\`\`\n${stats}\n\`\`\`\n\nCommit will be pushed when this PR is merged to \`main\`.`
            });
