name: SDK Tests

on:
  push:
    branches: [main]
    paths:
      - 'sdks/**'
      - '.github/workflows/sdk-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sdks/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sdk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Node.js SDK ---
  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/node
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sdks/node/package-lock.json
      - run: npm ci
      - run: npm test

  # --- Python SDK ---
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - run: python -m pytest test/ -v

  # --- Go SDK ---
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test -v ./...

  # --- Rust SDK ---
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: sdks/rust/target/
          key: ${{ runner.os }}-rust-sdk-${{ hashFiles('sdks/rust/Cargo.lock') }}
      - run: cargo check
      - run: cargo test

  # --- Java SDK ---
  java:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/java
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: mvn test -B

  # --- Kotlin SDK ---
  kotlin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/kotlin
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v3
      - run: gradle test

  # --- Ruby SDK ---
  ruby:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/ruby
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - run: bundle exec rspec

  # --- PHP SDK ---
  php:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/php
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json, hash
      - run: composer install --no-progress
      - run: vendor/bin/phpunit

  # --- C# SDK ---
  csharp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/csharp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore
      - run: dotnet test --no-restore --verbosity normal

  # --- Elixir SDK ---
  elixir:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/elixir
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'
      - run: mix deps.get
      - run: mix test

  # --- Swift SDK ---
  swift:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/swift
    steps:
      - uses: actions/checkout@v6
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.10'
      - run: swift test
