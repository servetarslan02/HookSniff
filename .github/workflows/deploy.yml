name: Deploy to Cloud Run

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  PROJECT_ID: hooksniff-app
  REGION: europe-west1
  AR_REPO: hooksniff
  API_IMAGE: europe-west1-docker.pkg.dev/hooksniff-app/hooksniff/api
  WORKER_IMAGE: europe-west1-docker.pkg.dev/hooksniff-app/hooksniff/worker

jobs:
  build-and-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # ── Authenticate to GCP ──
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      # ── Build & Push API ──
      - name: Build API image
        run: |
          docker build -f Dockerfile.api \
            -t ${{ env.API_IMAGE }}:${{ github.sha }} \
            -t ${{ env.API_IMAGE }}:latest \
            .

      - name: Push API image
        run: |
          docker push ${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.API_IMAGE }}:latest

      # ── Build & Push Worker ──
      - name: Build Worker image
        run: |
          docker build -f Dockerfile.worker \
            -t ${{ env.WORKER_IMAGE }}:${{ github.sha }} \
            -t ${{ env.WORKER_IMAGE }}:latest \
            .

      - name: Push Worker image
        run: |
          docker push ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.WORKER_IMAGE }}:latest

      # ── Deploy API to Cloud Run ──
      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy hooksniff-api \
            --image ${{ env.API_IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 300 \
            --set-env-vars "APP_ENV=production,RUST_LOG=info,RATE_LIMIT_STORE=redis,LOG_FORMAT=json,WEBHOOK_FORMAT=standard,MAX_PAYLOAD_BYTES=1048576,RETENTION_DAYS=30,WEBHOOK_TIMESTAMP_TOLERANCE_SECS=300,APP_URL=https://hooksniff.vercel.app,CORS_ORIGINS=https://hooksniff.vercel.app,OTEL_ENABLED=true,OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-prod-eu-west-2.grafana.net/otlp" \
            --set-secrets "DATABASE_URL=neon-db-url:latest,REDIS_URL=upstash-redis-url:latest,JWT_SECRET=jwt-secret:latest,HMAC_SECRET=hmac-secret:latest,POLAR_ACCESS_TOKEN=polar-token:latest,POLAR_WEBHOOK_SECRET=polar-webhook:latest,POLAR_PRODUCT_PRO=polar-pro:latest,POLAR_PRODUCT_BUSINESS=polar-business:latest,OTEL_EXPORTER_OTLP_HEADERS=otel-headers:latest,GCP_SA_JSON=gcp-sa-json:latest" \
            --project ${{ env.PROJECT_ID }}

      # ── Deploy Worker to Cloud Run ──
      - name: Deploy Worker to Cloud Run
        run: |
          gcloud run deploy hooksniff-worker \
            --image ${{ env.WORKER_IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --set-env-vars "APP_ENV=production,RUST_LOG=info,RATE_LIMIT_STORE=redis,LOG_FORMAT=json,OTEL_ENABLED=true,OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-prod-eu-west-2.grafana.net/otlp" \
            --set-secrets "DATABASE_URL=neon-db-url:latest,REDIS_URL=upstash-redis-url:latest,JWT_SECRET=jwt-secret:latest,HMAC_SECRET=hmac-secret:latest,GCP_SA_JSON=gcp-sa-json:latest" \
            --project ${{ env.PROJECT_ID }}

      # ── Output URLs ──
      - name: Show deployed URLs
        run: |
          echo "🚀 API deployed to:"
          gcloud run services describe hooksniff-api \
            --region ${{ env.REGION }} \
            --format 'value(status.url)' \
            --project ${{ env.PROJECT_ID }}
