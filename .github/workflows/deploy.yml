name: Deploy to Cloud Run

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  PROJECT_ID: hooksniff-app
  REGION: europe-west1
  AR_REPO: hooksniff
  API_IMAGE: europe-west1-docker.pkg.dev/hooksniff-app/hooksniff/api
  WORKER_IMAGE: europe-west1-docker.pkg.dev/hooksniff-app/hooksniff/worker

jobs:
  build-and-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # ── Authenticate to GCP ──
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      # ── Build & Push API ──
      - name: Build API image
        run: |
          docker build -f Dockerfile.api \
            -t ${{ env.API_IMAGE }}:${{ github.sha }} \
            -t ${{ env.API_IMAGE }}:latest \
            .

      - name: Push API image
        run: |
          docker push ${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.API_IMAGE }}:latest

      # ── Build & Push Worker ──
      - name: Build Worker image
        run: |
          docker build -f Dockerfile.worker \
            -t ${{ env.WORKER_IMAGE }}:${{ github.sha }} \
            -t ${{ env.WORKER_IMAGE }}:latest \
            .

      - name: Push Worker image
        run: |
          docker push ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.WORKER_IMAGE }}:latest

      # ── Deploy API to Cloud Run ──
      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy hooksniff-api \
            --image ${{ env.API_IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 300 \
            --set-env-vars "APP_ENV=production,RUST_LOG=info,RATE_LIMIT_STORE=redis,LOG_FORMAT=json,WEBHOOK_FORMAT=standard,MAX_PAYLOAD_BYTES=1048576,RETENTION_DAYS=30,WEBHOOK_TIMESTAMP_TOLERANCE_SECS=300,APP_URL=https://hooksniff.vercel.app,CORS_ORIGINS=https://hooksniff.vercel.app,OTEL_ENABLED=true,OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-prod-eu-west-2.grafana.net/otlp" \
            --set-secrets "DATABASE_URL=neon-db-url:latest,REDIS_URL=upstash-redis-url:latest,JWT_SECRET=jwt-secret:latest,HMAC_SECRET=hmac-secret:latest,POLAR_ACCESS_TOKEN=polar-token:latest,POLAR_WEBHOOK_SECRET=polar-webhook:latest,POLAR_PRODUCT_PRO=polar-pro:latest,POLAR_PRODUCT_BUSINESS=polar-business:latest,OTEL_EXPORTER_OTLP_HEADERS=otel-headers:latest,GCP_SA_JSON=gcp-sa-json:latest" \
            --project ${{ env.PROJECT_ID }}

      # ── Deploy Worker to Cloud Run ──
      - name: Deploy Worker to Cloud Run
        run: |
          gcloud run deploy hooksniff-worker \
            --image ${{ env.WORKER_IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --set-env-vars "APP_ENV=production,RUST_LOG=info,RATE_LIMIT_STORE=redis,LOG_FORMAT=json,OTEL_ENABLED=true,OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-prod-eu-west-2.grafana.net/otlp" \
            --set-secrets "DATABASE_URL=neon-db-url:latest,REDIS_URL=upstash-redis-url:latest,JWT_SECRET=jwt-secret:latest,HMAC_SECRET=hmac-secret:latest,GCP_SA_JSON=gcp-sa-json:latest" \
            --project ${{ env.PROJECT_ID }}

      # ── Output URLs ──
      - name: Show deployed URLs
        run: |
          echo "🚀 API deployed to:"
          gcloud run services describe hooksniff-api \
            --region ${{ env.REGION }} \
            --format 'value(status.url)' \
            --project ${{ env.PROJECT_ID }}

      # ── Item 38: Health check + automatic rollback on failure ──
      - name: Verify API health after deploy
        id: health_check
        run: |
          API_URL=$(gcloud run services describe hooksniff-api \
            --region ${{ env.REGION }} \
            --format 'value(status.url)' \
            --project ${{ env.PROJECT_ID }})
          
          echo "Waiting 30s for new revision to stabilize..."
          sleep 30
          
          MAX_RETRIES=5
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ API health check passed (attempt $i)"
              exit 0
            fi
            echo "⚠️ API health check failed: HTTP $HTTP_CODE (attempt $i/$MAX_RETRIES)"
            if [ $i -lt $MAX_RETRIES ]; then
              sleep $RETRY_DELAY
            fi
          done
          
          echo "❌ API health check failed after $MAX_RETRIES attempts"
          echo "rollback_needed=true" >> $GITHUB_OUTPUT

      - name: Rollback API on health check failure
        if: steps.health_check.outputs.rollback_needed == 'true'
        run: |
          echo "🔄 Rolling back API to previous revision..."
          PREVIOUS_REVISION=$(gcloud run services describe hooksniff-api \
            --region ${{ env.REGION }} \
            --format 'value(status.latestReadyRevisionName)' \
            --project ${{ env.PROJECT_ID }} | head -2 | tail -1)
          
          if [ -n "$PREVIOUS_REVISION" ]; then
            gcloud run services update-traffic hooksniff-api \
              --region ${{ env.REGION }} \
              --to-revisions "$PREVIOUS_REVISION=100" \
              --project ${{ env.PROJECT_ID }}
            echo "✅ Rolled back API to $PREVIOUS_REVISION"
          else
            echo "❌ No previous revision found for rollback"
          fi
          exit 1

      - name: Verify Worker health after deploy
        run: |
          WORKER_URL=$(gcloud run services describe hooksniff-worker \
            --region ${{ env.REGION }} \
            --format 'value(status.url)' \
            --project ${{ env.PROJECT_ID }})
          
          echo "Waiting 15s for worker to stabilize..."
          sleep 15
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${WORKER_URL}/health" || echo "000")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️ Worker health check failed: HTTP $HTTP_CODE"
            echo "🔄 Rolling back Worker to previous revision..."
            PREVIOUS_REVISION=$(gcloud run services describe hooksniff-worker \
              --region ${{ env.REGION }} \
              --format 'value(status.latestReadyRevisionName)' \
              --project ${{ env.PROJECT_ID }} | head -2 | tail -1)
            if [ -n "$PREVIOUS_REVISION" ]; then
              gcloud run services update-traffic hooksniff-worker \
                --region ${{ env.REGION }} \
                --to-revisions "$PREVIOUS_REVISION=100" \
                --project ${{ env.PROJECT_ID }}
              echo "✅ Rolled back Worker to $PREVIOUS_REVISION"
              exit 1
            fi
          fi
          echo "✅ Worker health check passed"
