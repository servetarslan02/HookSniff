name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ──────────────────────────────────────────────
  # Rust linting (fmt + clippy)
  # ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache Rust build artifacts
      - uses: actions/cache@v4
        with:
          path: |
            target/
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ──────────────────────────────────────────────
  # Rust tests
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      cockroachdb:
        image: cockroachdb/cockroach:latest
        ports: ['26257:26257']
        options: --cmd "start-single-node --insecure"
        # Wait for CockroachDB to accept connections
        env:
          COCKROACH_DATABASE: hookrelay
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Run tests
        run: cargo test --workspace
        env:
          DATABASE_URL: postgresql://root@localhost:26257/hookrelay?sslmode=disable

  # ──────────────────────────────────────────────
  # Build Rust binaries
  # ──────────────────────────────────────────────
  build-api:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build API
        run: cargo build --release -p hookrelay-api

      - uses: actions/upload-artifact@v4
        with:
          name: api-binary
          path: target/release/hookrelay-api

  build-worker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build Worker
        run: cargo build --release -p hookrelay-worker

      - uses: actions/upload-artifact@v4
        with:
          name: worker-binary
          path: target/release/hookrelay-worker

  # ──────────────────────────────────────────────
  # Dashboard (Next.js)
  # ──────────────────────────────────────────────
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Lint
        working-directory: dashboard
        run: npm run lint

      - name: Build
        working-directory: dashboard
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: dashboard/.next

  # ──────────────────────────────────────────────
  # AI Center (Rust)
  # ──────────────────────────────────────────────
  build-ai-center:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build AI Center
        run: cargo build --release -p hookrelay-ai-center

      - uses: actions/upload-artifact@v4
        with:
          name: ai-center-binary
          path: target/release/hookrelay-ai-center
