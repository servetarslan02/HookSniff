name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # --- Rust linting (fmt + clippy) ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v5
        with:
          path: target/
          key: ${{ runner.os }}-cargo-lint-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-v2-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings

  # --- Rust tests ---
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: hooksniff
          POSTGRES_PASSWORD: hooksniff_test
          POSTGRES_DB: hooksniff
        options: >-
          --health-cmd="pg_isready -U hooksniff -d hooksniff"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: target/
          key: ${{ runner.os }}-cargo-test-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-v2-

      - name: Run tests
        run: cargo test --workspace
        env:
          DATABASE_URL: postgresql://hooksniff:hooksniff_test@localhost:5432/hooksniff?sslmode=disable

  # --- Build Rust binaries ---
  build-api:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: target/
          key: ${{ runner.os }}-cargo-release-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-v2-$

      - name: Build API
        run: cargo build --release -p hooksniff-api

      - uses: actions/upload-artifact@v7
        with:
          name: api-binary
          path: target/release/hooksniff-api

  build-worker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: target/
          key: ${{ runner.os }}-cargo-release-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-v2-$

      - name: Build Worker
        run: cargo build --release -p hooksniff-worker

      - uses: actions/upload-artifact@v7
        with:
          name: worker-binary
          path: target/release/hooksniff-worker

  # --- Dashboard (Next.js) ---
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Lint
        working-directory: dashboard
        run: npm run lint

      - name: Test
        working-directory: dashboard
        run: npm test

      - name: Build
        working-directory: dashboard
        run: npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: dashboard-build
          path: dashboard/.next

  # --- Security audit (Rust + Node) ---
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Rust dependency audit
        run: cargo audit

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Node dependency audit
        working-directory: dashboard
        run: npm audit --audit-level=high
        continue-on-error: true
