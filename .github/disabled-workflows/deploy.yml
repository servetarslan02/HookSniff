name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hooksniff-api:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/hooksniff-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/hooksniff-api:buildcache,mode=max

      - name: Build and push Worker
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hooksniff-worker:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/hooksniff-worker:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/hooksniff-worker:buildcache,mode=max

      - name: Build and push Dashboard
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hooksniff-dashboard:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/hooksniff-dashboard:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/hooksniff-dashboard:buildcache,mode=max
