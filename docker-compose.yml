# HookSniff — Full Stack (Development)
# Kullanım: docker compose up
#
# Servisler:
#   - PostgreSQL (veritabanı)
#   - Rust API (backend)
#   - Rust Worker (webhook teslimatı)
#   - Next.js Dashboard (frontend)

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:17-alpine
    container_name: hooksniff-db
    environment:
      POSTGRES_USER: hooksniff
      POSTGRES_PASSWORD: hooksniff_local
      POSTGRES_DB: hooksniff
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hooksniff -d hooksniff"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── HookSniff API ──
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: hooksniff-api
    ports:
      - "3000:3000"
    environment:
      APP_ENV: development
      PORT: "3000"
      DATABASE_URL: "postgresql://hooksniff:hooksniff_local@postgres:5432/hooksniff?sslmode=disable"
      HMAC_SECRET: "local-dev-hmac-secret-not-for-production"
      JWT_SECRET: "local-dev-jwt-secret-not-for-production"
      RUST_LOG: "info,hooksniff=debug"
      MAX_PAYLOAD_BYTES: "1048576"
      RETENTION_DAYS: "30"
      WEBHOOK_FORMAT: "standard"
      WEBHOOK_TIMESTAMP_TOLERANCE_SECS: "300"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── HookSniff Worker ──
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: hooksniff-worker
    environment:
      DATABASE_URL: "postgresql://hooksniff:hooksniff_local@postgres:5432/hooksniff?sslmode=disable"
      RUST_LOG: "info,hooksniff=debug"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Dashboard ──
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: hooksniff-dashboard
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3000/v1"
      PORT: "3001"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
