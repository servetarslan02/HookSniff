apiVersion: v1
kind: Secret
metadata:
  name: hookrelay-secrets
  namespace: hookrelay
type: Opaque
stringData:
  # ⚠️ TEMPLATE — Replace with real values before deploying!
  # Generate secrets: openssl rand -hex 32
  DATABASE_URL: "postgresql://hookrelay:CHANGE_ME@postgres.hookrelay.svc.cluster.local:5432/hookrelay?sslmode=disable"
  HMAC_SECRET: "REPLACE_WITH_GENERATED_SECRET"
  JWT_SECRET: "REPLACE_WITH_GENERATED_SECRET"
