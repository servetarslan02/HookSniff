apiVersion: apps/v1
kind: Deployment
metadata:
  name: hookrelay-worker
  namespace: hookrelay
  labels:
    app: hookrelay-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hookrelay-worker
  template:
    metadata:
      labels:
        app: hookrelay-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/hookrelay/hookrelay-worker:latest
          envFrom:
            - configMapRef:
                name: hookrelay-config
            - secretRef:
                name: hookrelay-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
