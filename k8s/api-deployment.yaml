apiVersion: apps/v1
kind: Deployment
metadata:
  name: hookrelay-api
  namespace: hookrelay
  labels:
    app: hookrelay-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hookrelay-api
  template:
    metadata:
      labels:
        app: hookrelay-api
    spec:
      containers:
        - name: api
          image: ghcr.io/hookrelay/hookrelay-api:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: hookrelay-config
            - secretRef:
                name: hookrelay-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
