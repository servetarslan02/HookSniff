[package]
name = "hooksniff"
version = "0.3.0"
edition = "2021"
description = "Official Rust client for the HookSniff webhook delivery service"
license = "MIT"
repository = "https://github.com/servetarslan02/hooksniff"
homepage = "https://hooksniff.vercel.app"

[dependencies]
reqwest = { version = "0.12", features = ["json", "rustls-tls", "blocking"], default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_repr = "0.1"
serde_with = { version = "3", features = ["macros"] }
hmac = "0.12"
sha2 = "0.10"
chrono = { version = "0.4", features = ["serde"] }
url = "2"
uuid = { version = "1", features = ["v4", "serde"] }
