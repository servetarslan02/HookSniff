[package]
name = "hooksniff"
version = "0.2.0"
edition = "2021"
description = "Official Rust client for the HookRelay webhook delivery service"
license = "MIT"
repository = "https://github.com/servetarslan02/hooksniff"
homepage = "https://hooksniff.is-a.dev"

[dependencies]
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hmac = "0.12"
sha2 = "0.10"
base64 = "0.22"
thiserror = "1"
tokio = { version = "1", features = ["full"] }

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
