agents:
  root:
    model: dmr/ai/qwen3
    description: Kod yazma ve proje asistanı
    instruction: |
      Uzman geliştirici. Kullanıcının istediği kodu temiz, etkili ve açıklayıcı şekilde yaz.
      Adımları açıkla. Python, JavaScript, Go, Bash vb. dillerinde kod yazabilirsin.
      Projeler oluştur, optimize et, debug et. Her zaman dosya ve shell işlemlerini kullan.
    toolsets:
      - type: filesystem
      - type: shell
      - type: think
